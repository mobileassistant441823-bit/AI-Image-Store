<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SoftTech AI – 100K Image Gallery (No Duplicates)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .badge-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: white;
        }
        .stats-dashboard {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        .stat-card {
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }
        .performance-bar {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .perf-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .perf-control label {
            font-size: 0.85rem;
            color: #666;
        }
        select, input {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .filter-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            position: sticky;
            top: 10px;
            z-index: 100;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .filter-group {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
        }
        .filter-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 8px;
        }
        .filter-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-warning {
            background: #ffc107;
            color: #333;
        }
        .gallery-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            position: relative;
            min-height: 600px;
        }
        .virtual-scroll-container {
            position: relative;
            overflow-y: auto;
            max-height: calc(100vh - 400px);
            min-height: 600px;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 10px;
        }
        .image-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .image-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        .image-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            cursor: pointer;
            background: #f0f0f0;
        }
        .image-info {
            padding: 12px;
        }
        .image-title {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .image-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 8px 0;
        }
        .tag {
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .image-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .icon-btn {
            flex: 1;
            padding: 6px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .icon-btn.download {
            background: #28a745;
            color: white;
        }
        .icon-btn.view {
            background: #17a2b8;
            color: white;
        }
        .loading-bar {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.9);
            border-radius: 10px;
            margin: 10px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }
        .modal-content img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 10px;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
        }
        .modal-info {
            color: white;
            padding: 20px;
            text-align: center;
        }
        @media (max-width: 768px) {
            .image-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
            .filter-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="logo">🚀 SoftTech AI – 100K Gallery</h1>
            <div class="badge-container">
                <span class="badge">♾️ 100,000+ IMAGES</span>
                <span class="badge">🚫 NO DUPLICATES</span>
                <span class="badge">⚡ VIRTUAL SCROLL</span>
                <span class="badge">💾 FREE & FAST</span>
            </div>
        </div>

        <div class="stats-dashboard">
            <div class="stat-card"><div class="stat-value" id="totalCount">0</div><div>Total Images</div></div>
            <div class="stat-card"><div class="stat-value" id="visibleCount">0</div><div>Visible</div></div>
            <div class="stat-card"><div class="stat-value" id="filteredCount">0</div><div>Filtered</div></div>
            <div class="stat-card"><div class="stat-value" id="loadTime">0ms</div><div>Load Time</div></div>
            <div class="stat-card"><div class="stat-value" id="memoryUsage">0MB</div><div>Memory</div></div>
        </div>

        <div class="performance-bar">
            <div class="perf-control">
                <label>📊 Batch Size:</label>
                <select id="batchSize">
                    <option value="20">20</option>
                    <option value="50" selected>50</option>
                    <option value="100">100</option>
                    <option value="200">200</option>
                </select>
            </div>
            <div class="perf-control">
                <label>🎨 Quality:</label>
                <select id="imageQuality">
                    <option value="low">Fast</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">HD</option>
                </select>
            </div>
            <div class="perf-control">
                <label>📦 Data Source:</label>
                <select id="dataSource">
                    <option value="dynamic">Dynamic (Picsum)</option>
                    <option value="picsum">Picsum API</option>
                    <option value="placeholder">Placeholder</option>
                </select>
            </div>
            <button class="btn-warning" onclick="generateMoreImages()">➕ Generate 10,000 More</button>
            <button class="btn-secondary" onclick="clearCache()">🗑️ Clear Cache</button>
        </div>

        <div class="filter-section">
            <div class="filter-grid">
                <div class="filter-group">
                    <label>🎨 Art Style</label>
                    <select id="styleFilter">
                        <option value="all">All Styles</option>
                        <option value="photorealistic">Photorealistic</option>
                        <option value="anime">Anime</option>
                        <option value="fantasy">Fantasy</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="abstract">Abstract</option>
                        <option value="minimalist">Minimalist</option>
                        <option value="vintage">Vintage</option>
                        <option value="surreal">Surreal</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>🖼️ Orientation</label>
                    <select id="shapeFilter">
                        <option value="all">All</option>
                        <option value="square">Square</option>
                        <option value="portrait">Portrait</option>
                        <option value="landscape">Landscape</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>🎨 Color Scheme</label>
                    <select id="colorFilter">
                        <option value="all">All</option>
                        <option value="vibrant">Vibrant</option>
                        <option value="pastel">Pastel</option>
                        <option value="dark">Dark</option>
                        <option value="neon">Neon</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>🔍 Search</label>
                    <input type="text" id="searchFilter" placeholder="Keywords...">
                </div>
            </div>
            <div class="filter-actions">
                <button class="btn-primary" onclick="applyFilters()">Apply Filters</button>
                <button class="btn-secondary" onclick="resetFilters()">Reset</button>
                <button class="btn-success" onclick="exportData()">Export Data</button>
            </div>
        </div>

        <div class="gallery-container">
            <div id="virtualScrollContainer" class="virtual-scroll-container">
                <div id="imageGrid" class="image-grid"></div>
                <div id="loadingIndicator" class="loading-bar" style="display: none;">
                    <div class="spinner"></div>
                    <p>Loading more images...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <img id="modalImage" src="" alt="Preview">
            <div id="modalInfo" class="modal-info"></div>
        </div>
    </div>

    <script>
        // ==================== MEGA GALLERY ENGINE ====================
        // 100,000+ unique images guaranteed

        let masterImageList = [];
        let filteredImageList = [];
        let currentStartIndex = 0;
        let currentEndIndex = 0;
        let isLoading = false;
        let totalImageCount = 0;

        // Track used URLs to prevent duplicates
        let usedUrls = new Set();

        // Configuration
        let BATCH_SIZE = 50;
        let currentDataSource = 'dynamic';
        let imageQuality = 'medium';

        // Style definitions
        const styles = ['photorealistic', 'anime', 'fantasy', 'cyberpunk', 'abstract', 'minimalist', 'vintage', 'surreal'];
        const orientations = ['square', 'portrait', 'landscape'];
        const colorSchemes = ['vibrant', 'pastel', 'dark', 'neon'];

        // Helper: Get base URL (remove query parameters)
        function getBaseUrl(url) {
            return url.split('?')[0];
        }

        // Check if an image URL is already used
        function isUrlUsed(url) {
            return usedUrls.has(getBaseUrl(url));
        }

        // Mark a URL as used
        function markUrlUsed(url) {
            usedUrls.add(getBaseUrl(url));
        }

        // Generate a unique image with duplicate avoidance
        function generateUniqueImage(index, attemptOffset = 0) {
            const maxAttempts = 20;
            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                const style = styles[(index + attempt + attemptOffset) % styles.length];
                const orientation = orientations[Math.floor(Math.random() * orientations.length)];
                const colorScheme = colorSchemes[Math.floor(Math.random() * colorSchemes.length)];
                
                const width = orientation === 'square' ? 512 : orientation === 'portrait' ? 512 : 768;
                const height = orientation === 'square' ? 512 : orientation === 'portrait' ? 768 : 512;
                
                // Generate URL based on data source
                let url;
                if (currentDataSource === 'picsum') {
                    const randomId = Math.floor(Math.random() * 1000) + 1;
                    url = `https://picsum.photos/id/${randomId}/${width}/${height}?t=${Date.now()}-${index}-${attempt}`;
                } else if (currentDataSource === 'placeholder') {
                    url = `https://via.placeholder.com/${width}x${height}?text=Image+${index}+${attempt}`;
                } else {
                    const randomId = Math.floor(Math.random() * 1000) + 1;
                    url = `https://picsum.photos/id/${randomId}/${width}/${height}?t=${Date.now()}-${index}-${attempt}`;
                }
                
                // Check for duplicate
                if (!isUrlUsed(url)) {
                    const titles = [
                        "Epic Landscape", "Mystical Journey", "Digital Dreams", "Future Vision",
                        "Nature's Beauty", "Cosmic Dance", "Urban Jungle", "Ethereal Moments",
                        "Abstract Thoughts", "Timeless Memory", "Infinite Horizon", "Creative Spark"
                    ];
                    
                    const image = {
                        id: `${Date.now()}-${index}-${attempt}-${Math.random().toString(36).substr(2, 8)}`,
                        title: `${titles[index % titles.length]} #${index + 1}`,
                        prompt: `Beautiful AI generated artwork with ${style} style, ${colorScheme} colors, stunning details`,
                        style: style,
                        orientation: orientation,
                        colorScheme: colorScheme,
                        width: width,
                        height: height,
                        url: url,
                        tags: [style, orientation, colorScheme, `img-${index}`],
                        rating: Math.floor(Math.random() * 5) + 1,
                        createdAt: new Date(Date.now() - index * 86400000).toISOString()
                    };
                    
                    markUrlUsed(url);
                    return image;
                }
            }
            console.warn(`Could not generate unique image for index ${index} after ${maxAttempts} attempts`);
            return null;
        }

        // Generate massive dataset with unique images
        function generateMassiveDataset(count) {
            console.log(`Generating ${count.toLocaleString()} unique images...`);
            const startGen = performance.now();
            
            const newImages = [];
            const startId = masterImageList.length;
            
            for (let i = 0; i < count; i++) {
                const newImage = generateUniqueImage(startId + i, i);
                if (newImage) {
                    newImages.push(newImage);
                }
            }
            
            masterImageList = [...masterImageList, ...newImages];
            totalImageCount = masterImageList.length;
            filteredImageList = [...masterImageList];
            
            const endGen = performance.now();
            console.log(`Generated ${newImages.length} unique images in ${(endGen - startGen).toFixed(2)}ms`);
            console.log(`Skipped ${count - newImages.length} duplicates`);
            
            updateStats();
            updateMemoryUsage();
            saveToLocalStorage();
            return newImages.length;
        }

        // Initialize gallery (load or generate)
        function initializeGallery() {
            const savedData = localStorage.getItem('softtech_mega_gallery');
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    masterImageList = parsed;
                    totalImageCount = masterImageList.length;
                    filteredImageList = [...masterImageList];
                    
                    // Rebuild used URLs set from loaded images
                    usedUrls.clear();
                    masterImageList.forEach(img => {
                        if (img.url) markUrlUsed(img.url);
                    });
                    
                    console.log(`Loaded ${totalImageCount.toLocaleString()} images from cache`);
                } catch(e) {
                    console.error('Failed to load cache', e);
                    generateMassiveDataset(10000);
                }
            } else {
                generateMassiveDataset(10000); // Start with 10,000 images
            }
            
            updateStats();
            applyFilters(); // Initial render
            updateMemoryUsage();
            
            // Setup infinite scroll
            setupInfiniteScroll();
        }

        // Setup infinite scroll
        function setupInfiniteScroll() {
            const container = document.getElementById('virtualScrollContainer');
            let scrollTimeout;
            
            container.addEventListener('scroll', () => {
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => {
                    const { scrollTop, scrollHeight, clientHeight } = container;
                    if (scrollTop + clientHeight >= scrollHeight - 500 && !isLoading) {
                        loadMoreImages();
                    }
                }, 100);
            });
        }

        // Load more images
        async function loadMoreImages() {
            if (isLoading) return;
            
            isLoading = true;
            document.getElementById('loadingIndicator').style.display = 'block';
            
            await new Promise(resolve => setTimeout(resolve, 100));
            
            const newStart = currentEndIndex;
            const newEnd = Math.min(newStart + BATCH_SIZE, filteredImageList.length);
            
            if (newStart >= filteredImageList.length) {
                document.getElementById('loadingIndicator').innerHTML = '<p>✨ End of gallery! ✨</p>';
                isLoading = false;
                return;
            }
            
            const newImages = filteredImageList.slice(newStart, newEnd);
            appendImagesToDOM(newImages);
            
            currentStartIndex = newStart;
            currentEndIndex = newEnd;
            
            if (currentEndIndex >= filteredImageList.length) {
                document.getElementById('loadingIndicator').innerHTML = '<p>✨ You\'ve reached the end! ✨</p>';
            } else {
                document.getElementById('loadingIndicator').style.display = 'block';
                document.getElementById('loadingIndicator').innerHTML = '<div class="spinner"></div><p>Loading more images...</p>';
            }
            
            isLoading = false;
            updateStats();
        }

        // Append images to DOM
        function appendImagesToDOM(images) {
            const grid = document.getElementById('imageGrid');
            
            images.forEach(image => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.setAttribute('data-id', image.id);
                
                const qualityParam = imageQuality === 'high' ? '' : imageQuality === 'low' ? '?grayscale' : '';
                
                card.innerHTML = `
                    <img 
                        src="${image.url}${qualityParam}" 
                        alt="${image.title}"
                        loading="lazy"
                        onerror="this.src='https://via.placeholder.com/${image.width}x${image.height}?text=Image+Not+Loaded'"
                        onclick='openModal(${JSON.stringify(image).replace(/'/g, "\\'")})'
                    >
                    <div class="image-info">
                        <div class="image-title">${escapeHtml(image.title)}</div>
                        <div class="image-tags">
                            ${image.tags.slice(0, 3).map(tag => `<span class="tag" onclick="filterByTag('${escapeHtml(tag)}')">#${escapeHtml(tag)}</span>`).join('')}
                        </div>
                        <div class="image-actions">
                            <button class="icon-btn view" onclick='openModal(${JSON.stringify(image).replace(/'/g, "\\'")})'>👁️ View</button>
                            <button class="icon-btn download" onclick="downloadImage('${image.url}', '${escapeHtml(image.title)}')">💾 Download</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            updateVisibleCount();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Apply filters
        function applyFilters() {
            const styleFilter = document.getElementById('styleFilter').value;
            const shapeFilter = document.getElementById('shapeFilter').value;
            const colorFilter = document.getElementById('colorFilter').value;
            const searchTerm = document.getElementById('searchFilter').value.toLowerCase();
            
            const startFilter = performance.now();
            
            filteredImageList = masterImageList.filter(image => {
                if (styleFilter !== 'all' && image.style !== styleFilter) return false;
                if (shapeFilter !== 'all' && image.orientation !== shapeFilter) return false;
                if (colorFilter !== 'all' && image.colorScheme !== colorFilter) return false;
                if (searchTerm) {
                    return image.title.toLowerCase().includes(searchTerm) ||
                        image.prompt.toLowerCase().includes(searchTerm) ||
                        image.tags.some(tag => tag.includes(searchTerm));
                }
                return true;
            });
            
            const filterTime = performance.now() - startFilter;
            document.getElementById('loadTime').innerText = `${filterTime.toFixed(0)}ms`;
            
            // Reset render
            currentStartIndex = 0;
            currentEndIndex = 0;
            document.getElementById('imageGrid').innerHTML = '';
            
            // Load first batch
            const firstBatch = filteredImageList.slice(0, BATCH_SIZE);
            appendImagesToDOM(firstBatch);
            currentEndIndex = firstBatch.length;
            
            updateStats();
            
            // Show loading indicator if more images exist
            if (filteredImageList.length > BATCH_SIZE) {
                document.getElementById('loadingIndicator').style.display = 'block';
            } else {
                document.getElementById('loadingIndicator').style.display = 'none';
            }
        }

        // Reset filters
        function resetFilters() {
            document.getElementById('styleFilter').value = 'all';
            document.getElementById('shapeFilter').value = 'all';
            document.getElementById('colorFilter').value = 'all';
            document.getElementById('searchFilter').value = '';
            applyFilters();
        }

        // Generate more images
        function generateMoreImages() {
            const count = 10000;
            const newCount = generateMassiveDataset(count);
            alert(`✅ Generated ${newCount.toLocaleString()} new unique images!\nTotal: ${totalImageCount.toLocaleString()} images`);
            applyFilters();
            saveToLocalStorage();
        }

        // Save to localStorage
        function saveToLocalStorage() {
            try {
                const compressed = masterImageList.map(img => ({
                    id: img.id,
                    title: img.title,
                    style: img.style,
                    orientation: img.orientation,
                    colorScheme: img.colorScheme,
                    url: img.url,
                    tags: img.tags
                }));
                localStorage.setItem('softtech_mega_gallery', JSON.stringify(compressed));
                console.log('Data saved to localStorage');
            } catch(e) {
                console.warn('LocalStorage limit reached, using session only', e);
            }
        }

        // Clear cache
        function clearCache() {
            if (confirm('⚠️ Clear all cached images? This will reset to 10,000 unique images.')) {
                localStorage.removeItem('softtech_mega_gallery');
                masterImageList = [];
                usedUrls.clear();
                generateMassiveDataset(10000);
                applyFilters();
                updateMemoryUsage();
            }
        }

        // Export data
        function exportData() {
            const dataStr = JSON.stringify(masterImageList.slice(0, 1000), null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = `softtech_gallery_${totalImageCount}_images.json`;
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        // Change data source
        function changeDataSource() {
            currentDataSource = document.getElementById('dataSource').value;
            clearCache();
        }

        // Update stats
        function updateStats() {
            document.getElementById('totalCount').innerText = totalImageCount.toLocaleString();
            document.getElementById('filteredCount').innerText = filteredImageList.length.toLocaleString();
        }

        function updateVisibleCount() {
            const visibleCards = document.querySelectorAll('.image-card').length;
            document.getElementById('visibleCount').innerText = visibleCards.toLocaleString();
        }

        function updateMemoryUsage() {
            if (performance.memory) {
                const usedMB = performance.memory.usedJSHeapSize / 1024 / 1024;
                document.getElementById('memoryUsage').innerText = `${usedMB.toFixed(0)}MB`;
            } else {
                document.getElementById('memoryUsage').innerText = 'N/A';
            }
        }

        // Helper functions
        function filterByTag(tag) {
            document.getElementById('searchFilter').value = tag;
            applyFilters();
        }

        async function downloadImage(url, title) {
            const safeTitle = title.replace(/[^a-z0-9]/gi, '-');
            try {
                const toast = document.createElement('div');
                toast.textContent = 'Downloading...';
                toast.style.position = 'fixed';
                toast.style.bottom = '20px';
                toast.style.right = '20px';
                toast.style.backgroundColor = '#28a745';
                toast.style.color = 'white';
                toast.style.padding = '10px 20px';
                toast.style.borderRadius = '8px';
                toast.style.zIndex = '9999';
                document.body.appendChild(toast);

                const response = await fetch(url, { mode: 'cors' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `softtech-${safeTitle}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);

                toast.textContent = 'Download complete!';
                setTimeout(() => toast.remove(), 2000);
            } catch (err) {
                console.error('Download failed:', err);
                alert('Download failed. Try opening the image in a new tab.');
            }
        }

        function openModal(image) {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            const modalInfo = document.getElementById('modalInfo');
            
            modalImage.src = image.url;
            modalInfo.innerHTML = `
                <strong>${escapeHtml(image.title)}</strong><br>
                Style: ${image.style} | Orientation: ${image.orientation}<br>
                Rating: ${'⭐'.repeat(image.rating)}<br>
                Tags: ${image.tags.join(', ')}<br>
                <small>ID: ${image.id}</small>
                <br><button class="icon-btn download" style="margin-top:10px;" onclick="downloadImage('${image.url}', '${image.title}')">💾 Download</button>
            `;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        // Event listeners
        document.getElementById('batchSize').addEventListener('change', (e) => {
            BATCH_SIZE = parseInt(e.target.value);
            applyFilters();
        });

        document.getElementById('imageQuality').addEventListener('change', (e) => {
            imageQuality = e.target.value;
            applyFilters();
        });

        document.getElementById('dataSource').addEventListener('change', changeDataSource);

        // Periodic memory update
        setInterval(updateMemoryUsage, 5000);

        // Start the gallery
        initializeGallery();

        console.log('🚀 MEGA Gallery Loaded - No duplicates guaranteed!');
        console.log(`Performance: Virtual scrolling, lazy loading, chunked rendering`);
    </script>
</body>
</html>
